        }
        if (product.type === 'cake') {
            return Number(prices || 0);
        }
        if (product.type === 'quantity-item') {
            const qty = parseInt(item.options?.quantity) || 4;
            return Number(prices[qty] || prices[4] || 0);
        }
        return Number(item.price) || 0;
    }

    function formatPrice(amount, lang) {
        if (lang === 'en') return amount;
        return amount.toLocaleString('ru-RU');
    }

    function formatDate(dateStr, lang) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        const months_ru = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        const months_en = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const weekdays_ru = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
        const weekdays_en = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        if (lang === 'ru') {
            return `${d.getDate()} ${months_ru[d.getMonth()]} ${d.getFullYear()}, ${weekdays_ru[d.getDay()]}`;
        } else {
            return `${weekdays_en[d.getDay()]}, ${months_en[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        }
    }

    function applyLanguage(lang) {
        if (!translations[lang]) lang = 'ru';
        const prevLang = currentLang;
        currentLang = lang;
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (translations[lang] && translations[lang][key]) {
                el.textContent = translations[lang][key];
            }
        });
        
        document.documentElement.lang = lang;
        localStorage.setItem('hedonism_lang', lang);
        renderThankYou();
        
        trackGA4Event('language_change', { from_language: prevLang, to_language: lang, page_location: window.location.href });
        ymTrack('lang_switch', { from: prevLang, to: lang });
    }

    function renderThankYou() {
        const container = document.getElementById('thankyouContainer');
        const t = translations[currentLang];
        const currency = currentLang === 'en' ? 'AED' : '₽';
        
        if (!orderData) {
            container.innerHTML = `
                <div class="no-order">
                    <div class="no-order-icon">📭</div>
                    <h2 class="no-order-title">${t.noOrderTitle}</h2>
                    <p class="no-order-text">${t.noOrderText}</p>
                    <!-- ✅ Обновлено: путь к оформлению заказа -->
                    <a href="/pages/boxes.html" class="btn-home">${t.noOrderBtn}</a>
                </div>
            `;
            return;
        }
        
        let itemsHtml = '';
        let itemsTotal = 0;
        
        orderData.items.forEach(item => {
            const itemPrice = recalculateItemPrice(item, currentLang);
            const itemTotal = itemPrice * item.quantity;
            itemsTotal += itemTotal;
            
            const thumbUrl = item.image || `https://placehold.co/100x100/FFD93D/070395?text=${encodeURIComponent(item.productId)}`;
            const itemName = getItemName(item, currentLang);
            const productType = getProductType(item.productId);
            
            let optionsHtml = '';
            
            if (productType === 'box') {
                const persons = item.options?.persons || 2;
                let personsLabel;
                if (currentLang === 'ru') {
                    personsLabel = `${persons} ${getPersonsWordRu(persons)}`;
                } else {
                    personsLabel = persons === 1 ? '1 person' : `${persons} people`;
                }
                optionsHtml += `<div class="order-item-option"><span class="order-item-option-label">${t.itemPersons}</span><span class="order-item-option-value">${personsLabel}</span></div>`;
                
                if (item.options?.allergens?.length > 0) {
                    optionsHtml += `<div class="order-item-option"><span class="order-item-option-label">${t.itemAllergens}</span><span class="order-item-option-value">${item.options.allergens.join(', ')}</span></div>`;
                }
            } else if (productType === 'cake') {
                optionsHtml += `<div class="order-item-option"><span class="order-item-option-label">${t.itemWeight}</span><span class="order-item-option-value">${t.weightLabel}</span></div>`;
            } else if (productType === 'quantity-item') {
                const qty = item.options?.quantity || 4;
                let qtyLabel;
                if (currentLang === 'ru') {
                    qtyLabel = `${qty} ${qty === 4 ? t.qtyWord4 : t.qtyWord8}`;
                } else {
                    qtyLabel = `${qty} pieces`;
                }
                optionsHtml += `<div class="order-item-option"><span class="order-item-option-label">${t.itemQuantity}</span><span class="order-item-option-value">${qtyLabel}</span></div>`;
            }
            
            itemsHtml += `
                <div class="order-item">
                    <div class="order-item-thumb" style="background-image: url('${thumbUrl}')"></div>
                    <div class="order-item-info">
                        <div class="order-item-name">${itemName}${item.quantity > 1 ? ` × ${item.quantity}` : ''}</div>
                        <div class="order-item-options">${optionsHtml}</div>
                    </div>
                    <div class="order-item-price">
                        <span>${formatPrice(itemTotal, currentLang)}</span>
                        <span>${currency}</span>
                    </div>
                </div>
            `;
        });
        
        const isPickup = orderData.delivery === 'pickup';
        const deliveryText = isPickup ? (typeof SITE_SETTINGS !== 'undefined' && SITE_SETTINGS?.pickup[currentLang] ? SITE_SETTINGS.pickup[currentLang] : 'Самовывоз') : t.deliveryCourier;
        const deliveryCost = isPickup ? 0 : (currentLang === 'en' ? 40 : 800);
        const totalValue = itemsTotal + deliveryCost;
        
        container.innerHTML = `
            <div class="thankyou-hero">
                <div class="thankyou-icon">✓</div>
                <h1 class="thankyou-title">${t.thankyouTitle}</h1>
                <p class="thankyou-subtitle">${t.thankyouSubtitle}</p>
                <div class="order-number-badge">
                    ${t.orderNumberLabel}<span>#${orderData.orderNumber}</span>
                </div>
            </div>
            
            <div class="thankyou-details">
                <div class="details-section">
                    <h3 class="details-section-title">${t.sectionItems}</h3>
                    ${itemsHtml}
                </div>
                
                <div class="details-section">
                    <h3 class="details-section-title">${t.sectionDelivery}</h3>
                    <div class="info-row">
                        <span class="info-label">${t.labelDelivery}</span>
                        <span class="info-value">${deliveryText}</span>
                    </div>
                    ${!isPickup && orderData.address ? `
                    <div class="info-row">
                        <span class="info-label">${t.labelAddress}</span>
                        <span class="info-value">${orderData.address}</span>
                    </div>
                    ` : ''}
                    <div class="info-row">
                        <span class="info-label">${t.labelDate}</span>
                        <span class="info-value">${formatDate(orderData.date, currentLang)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">${t.labelTime}</span>
                        <span class="info-value">${orderData.time || '—'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">${t.labelDeliveryCost}</span>
                        <span class="info-value">
                            <span class="info-value-price">
                                <span>${deliveryCost === 0 ? t.deliveryFree : formatPrice(deliveryCost, currentLang)}</span>
                                ${deliveryCost > 0 ? `<span>${currency}</span>` : ''}
                            </span>
                        </span>
                    </div>
                </div>
                
                <div class="details-section">
                    <h3 class="details-section-title">${t.sectionContacts}</h3>
                    <div class="info-row">
                        <span class="info-label">${t.labelName}</span>
                        <span class="info-value">${orderData.name || '—'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">${t.labelPhone}</span>
                        <span class="info-value">${orderData.phone || '—'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">${t.labelMessenger}</span>
                        <span class="info-value">${orderData.messenger || '—'}</span>
                    </div>
                </div>
                
                <div class="details-section">
                    <h3 class="details-section-title">${t.sectionPayment}</h3>
                    <div class="info-row">
                        <span class="info-label">${t.labelPayment}</span>
                        <span class="info-value">${{ 'sber': t.paymentSber, 'tbank': t.paymentTbank, 'alfa': t.paymentAlfa, 'cash': t.paymentCash }[orderData.payment] || orderData.payment}</span>
                    </div>
                    ${orderData.comment ? `
                    <div class="info-row">
                        <span class="info-label">${t.labelComment}</span>
                        <span class="info-value">${orderData.comment}</span>
                    </div>
                    ` : ''}
                </div>
                
                <div class="order-total-row">
                    <span>${t.labelTotal}</span>
                    <div class="order-total-value">
                        <span>${formatPrice(totalValue, currentLang)}</span>
                        <span>${currency}</span>
                    </div>
                </div>
            </div>
            
            <div class="thankyou-actions">
                <a href="/" class="btn-home">🍋 ${t.btnHome}</a>
            </div>
        `;
    }

    document.addEventListener('DOMContentLoaded', function() {
        try {
            const savedOrder = sessionStorage.getItem('hedonism_last_order');
            if (savedOrder) {
                orderData = JSON.parse(savedOrder);
            }
        } catch (e) {
            console.warn('Не удалось загрузить данные заказа:', e);
        }
        
        const savedLang = localStorage.getItem('hedonism_lang') || 'ru';
        applyLanguage(savedLang);
        
        setTimeout(() => {
            trackGA4Event('page_view', {
                page_title: document.title, page_location: window.location.href,
                page_path: '/pages/thank-you.html', // ✅ Обновлено
                language: currentLang,
                has_order: !!orderData,
                order_number: orderData?.orderNumber || null
            });
        }, 1000);
        
        ymTrack('thankyou_viewed', { 
            lang: currentLang, 
            has_order: !!orderData,
            order_number: orderData?.orderNumber || null 
        });
        
        if (orderData) {
            ymTrack('thankyou_with_order', { 
                order_number: orderData.orderNumber, 
                total: orderData.total, 
                currency: orderData.currency 
            });
        }
        
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function() {
                const href = this.getAttribute('href');
                if (href?.includes('contacts')) ymTrack('nav_contacts_click');
                else if (href?.includes('history')) ymTrack('nav_history_click');
                else if (href === '/' || href?.includes('index.html')) ymTrack('nav_home_click');
            });
        });
        
        document.querySelectorAll('.social-link').forEach(link => {
            link.addEventListener('click', function() {
                const platform = this.getAttribute('aria-label') || 'social';
                const goalId = 'click_' + platform.toLowerCase().replace(/\s+/g, '_');
                ymTrack(goalId);
            });
        });
        
        console.log(`✅ thank-you.html ready! GA4: G-L8704SB9ZW, Language: ${currentLang.toUpperCase()}, Order: ${orderData?.orderNumber || 'none'}`);
    });
    </script>
</body>
</html>
