<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#070395">
    <title>Заказ принят | Вестник Гедонизма</title>
    
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        html, body { overflow-x: hidden; width: 100%; height: 100%; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b8a 0%, #070395 40%, #020133 100%);
            color: #ffffff; line-height: 1.6; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .thank-you-container {
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #FFD93D;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: inline-block;
            padding: 16px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: #FFD93D;
            color: #070395;
        }
        .btn-primary:hover {
            background: #fff;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            border-color: #FFD93D;
            color: #FFD93D;
        }
    </style>
</head>
<body>

    <div class="thank-you-container">
        <div class="success-icon">✨</div>
        <h1>Заказ принят!</h1>
        <p>Спасибо, что воспользовались нашим секретным Pop-up меню. <br>Мы уже получили ваш заказ и скоро свяжемся с вами в Telegram для подтверждения деталей и времени доставки.</p>
        
        <div class="btn-group">
            <a href="https://t.me/sash_shura" target="_blank" class="btn btn-primary">Написать в Telegram</a>
            <a href="/" class="btn btn-secondary">Вернуться на главную</a>
        </div>
    </div>

    <script>
        // Опционально: можно очистить данные заказа из localStorage после показа страницы
        // localStorage.removeItem('hedonism_popup_last_order');
    </script>
</body>
</html>
