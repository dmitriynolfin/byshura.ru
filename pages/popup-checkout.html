<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#070395">
    <title>Оформление Pop-up заказа | Вестник Гедонизма</title>
    
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        html, body { overflow-x: hidden; width: 100%; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b8a 0%, #070395 40%, #020133 100%);
            color: #ffffff; line-height: 1.6; min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; transition: color 0.3s; }
        a:hover { color: #FFD93D; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; width: 100%; 
            background: rgba(255,255,255,0.98); padding: 15px 0; z-index: 1000; 
            border-bottom: 1px solid rgba(7,3,149,0.2); backdrop-filter: blur(10px);
        }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .logo { width: 45px; height: 45px; background: #FFD93D; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .btn-back { border: 1.5px solid #070395; padding: 10px 25px; border-radius: 25px; font-weight: 600; font-size: 13px; color: #070395; transition: all 0.3s; }
        .btn-back:hover { background: #070395; color: white; }

        .checkout-main { margin-top: 100px; padding: 40px 0 80px; }
        .checkout-title { font-size: 28px; font-weight: 800; margin-bottom: 30px; text-align: center; color: #FFD93D; }

        .order-summary { background: rgba(255, 255, 255, 0.95); border-radius: 16px; padding: 25px; margin-bottom: 20px; color: #070395; }
        .summary-item { display: flex; justify-content: flex-start; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(7,3,149,0.1); }
        .summary-item:last-child { border-bottom: none; }
        
        /* ✅ Стили для фотографии товара (как на основной странице checkout) */
        .item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            margin-right: 15px;
            flex-shrink: 0;
            background: #f0f0f0;
            border: 1px solid rgba(7,3,149,0.1);
        }
        
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 16px; }
        .item-qty { font-size: 14px; color: #666; margin-top: 4px; }
        .item-price { font-weight: 800; font-size: 18px; white-space: nowrap; margin-left: 15px; }
        
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 2px solid #070395; font-size: 20px; font-weight: 800; }

        .checkout-form { background: rgba(255, 255, 255, 0.95); border-radius: 16px; padding: 30px; color: #070395; margin-bottom: 20px; }
        .form-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #070395; }
        
        .form-input { 
            width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; 
            font-size: 16px; font-family: inherit; transition: all 0.3s; box-sizing: border-box; 
            background: #ffffff;
        }
        .form-input:focus { outline: none; border-color: #070395; box-shadow: 0 0 0 3px rgba(7, 3, 149, 0.1); }
        
        /* ✅ Стили для неизменяемых полей */
        .form-input[readonly] {
            background: #f5f5f5;
            color: #555;
            cursor: not-allowed;
            border-color: #e0e0e0;
        }
        
        textarea.form-input { resize: vertical; min-height: 100px; }

        /* ✅ Кастомная валидация (советы, если поля не заполнены) */
        .form-input.invalid {
            border-color: #e74c3c;
            background-color: #fdf2f2;
        }
        .form-input.invalid:focus {
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }
        .validation-hint {
            color: #e74c3c;
            font-size: 13px;
            font-weight: 500;
            margin-top: 6px;
            display: none;
            align-items: center;
            gap: 5px;
        }
        .validation-hint::before {
            content: '⚠️';
            font-size: 14px;
        }
        .form-input.invalid + .validation-hint {
            display: flex;
        }

        /* ✅ Стили кнопки как на странице checkout */
        .submit-btn { 
            width: 100%; 
            background: #070395; 
            color: white; 
            padding: 18px 24px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px; 
            box-shadow: 0 4px 15px rgba(7, 3, 149, 0.2);
        }
        .submit-btn:hover { 
            background: #FFD93D; 
            color: #070395; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(255, 217, 61, 0.4); 
        }
        .submit-btn:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none;
        }

        .empty-cart-msg { text-align: center; padding: 40px; color: rgba(255,255,255,0.8); }
        .empty-cart-msg a { color: #FFD93D; text-decoration: underline; font-weight: 600; }

        @media (max-width: 480px) {
            .checkout-title { font-size: 24px; }
            .order-summary, .checkout-form { padding: 20px; }
            .item-image { width: 60px; height: 60px; margin-right: 12px; }
            .item-name { font-size: 15px; }
            .item-price { font-size: 16px; }
            .submit-btn { padding: 16px 20px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="/pages/popup" class="logo" aria-label="Главная">🍋</a>
            <a href="/pages/popup" class="btn-back">← Назад к меню</a>
        </div>
    </header>

    <main class="checkout-main">
        <div class="container">
            <h1 class="checkout-title">Оформление Pop-up заказа</h1>
            
            <div id="orderContent">
                <div class="order-summary">
                    <h3 class="form-title">Ваш заказ</h3>
                    <div id="summaryItems"></div>
                    <div class="summary-total">
                        <span>Итого:</span>
                        <span id="totalPrice">0 ₽</span>
                    </div>
                </div>

                <div class="checkout-form">
                    <h3 class="form-title">Детали получения</h3>
                    <div class="form-group">
                        <label class="form-label">Место получения</label>
                        <input type="text" class="form-input" value="ЖК Prime Park, Москва" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Дата</label>
                        <input type="text" class="form-input" value="25.07.2026" readonly>
                    </div>
                    <!-- ✅ Новый блок выбора времени -->
                    <div class="form-group">
                        <label class="form-label">Время получения *</label>
                        <select class="form-input" id="pickupTime" required>
                            <option value="" disabled selected>Выберите время</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="12:00">12:00</option>
                            <option value="13:00">13:00</option>
                            <option value="14:00">14:00</option>
                        </select>
                        <div class="validation-hint">Пожалуйста, выберите время получения</div>
                    </div>
                </div>

                <form class="checkout-form" id="popupOrderForm" novalidate>
                    <h3 class="form-title">Контактные данные</h3>
                    <div class="form-group">
                        <label class="form-label">Ваше имя *</label>
                        <input type="text" class="form-input" id="customerName" required placeholder="Как к вам обращаться?">
                        <div class="validation-hint">Пожалуйста, введите ваше имя</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Телефон или Telegram *</label>
                        <input type="text" class="form-input" id="customerContact" required placeholder="+7 (999) 000-00-00 или @username">
                        <div class="validation-hint">Пожалуйста, укажите способ связи</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Комментарий к заказу</label>
                        <textarea class="form-input" id="customerComment" placeholder="Аллергии, пожелания по времени и т.д."></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Подтвердить заказ</button>
                </form>
            </div>

            <div id="emptyCartMsg" class="empty-cart-msg" style="display: none;">
                <p>Ваша Pop-up корзина пуста.</p>
                <br>
                <a href="/pages/popup">Вернуться к секретному меню</a>
            </div>
        </div>
    </main>

    <script>
        let popupCart = JSON.parse(localStorage.getItem('hedonism_popup_cart')) || [];
        
        const summaryItemsEl = document.getElementById('summaryItems');
        const totalPriceEl = document.getElementById('totalPrice');
        const orderContentEl = document.getElementById('orderContent');
        const emptyCartMsgEl = document.getElementById('emptyCartMsg');
        const form = document.getElementById('popupOrderForm');

        if (popupCart.length === 0) {
            orderContentEl.style.display = 'none';
            emptyCartMsgEl.style.display = 'block';
        } else {
            let total = 0;
            let html = '';
            
            popupCart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                // ✅ Отображение фотографии товара с надежной заглушкой
                const imageUrl = item.image || '/assets/favicon-512.png';
                
                html += `
                    <div class="summary-item">
                        <img src="${imageUrl}" alt="${item.name}" class="item-image" onerror="this.src='/assets/favicon-512.png'">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-qty">${item.quantity} шт. × ${item.price} ₽</div>
                        </div>
                        <div class="item-price">${itemTotal} ₽</div>
                    </div>
                `;
            });
            
            summaryItemsEl.innerHTML = html;
            totalPriceEl.textContent = total + ' ₽';
        }

        // ✅ Кастомная валидация формы перед отправкой
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            let isValid = true;
            const requiredInputs = form.querySelectorAll('[required]');
            
            requiredInputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('invalid');
                    isValid = false;
                } else {
                    input.classList.remove('invalid');
                }
            });

            if (!isValid) {
                // Прокрутка к первому невалидному полю для удобства пользователя
                const firstInvalid = form.querySelector('.invalid');
                if (firstInvalid) {
                    firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    firstInvalid.focus();
                }
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
            
            const currentPopupCart = JSON.parse(localStorage.getItem('hedonism_popup_cart')) || [];
            const orderTotal = currentPopupCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const orderData = {
                items: currentPopupCart,
                total: orderTotal,
                customer: {
                    name: document.getElementById('customerName').value,
                    contact: document.getElementById('customerContact').value,
                    comment: document.getElementById('customerComment').value
                },
                delivery: "ЖК Prime Park, Москва",
                date: "25.07.2026",
                time: document.getElementById('pickupTime').value, // ✅ Добавлено время
                dateIso: new Date().toISOString(),
                type: 'popup_order'
            };

            localStorage.setItem('hedonism_popup_last_order', JSON.stringify(orderData));
            localStorage.removeItem('hedonism_popup_cart');
            
            window.location.href = '/pages/popup-thank-you';
        });

        // ✅ Убираем подсветку ошибки при вводе данных
        form.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                if (this.value.trim()) {
                    this.classList.remove('invalid');
                }
            });
        });
    </script>
</body>
</html>
